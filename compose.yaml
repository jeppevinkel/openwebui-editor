services:
  chat-editor:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Mount the directory that contains your SQLite file.
      # The path on the left is the host; the right is inside the container.
      - /path/to/your/db/directory:/data
    environment:
      DB_PATH: /data/webui.db   # adjust filename if different
      SECRET_KEY: change-me-to-something-random
      FLASK_DEBUG: "false"
    restart: unless-stopped